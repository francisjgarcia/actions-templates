version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 10
    target-branch: main
    assignees:
      - francisjgarcia
    commit-message:
      prefix: fix
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns:
          - "*"

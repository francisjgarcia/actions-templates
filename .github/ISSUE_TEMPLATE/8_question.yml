name: "\U0001F4AC Question"
description: Ask a question about how to use the templates.
title: "chore: question about <topic>"
labels: ["question"]
assignees:
  - francisjgarcia

body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check the [documentation](https://github.com/francisjgarcia/actions-templates/tree/main/docs) and [existing discussions](https://github.com/francisjgarcia/actions-templates/discussions).

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to achieve? What have you already tried?
    validations:
      required: true

  - type: input
    id: ref
    attributes:
      label: Template version (ref)
      placeholder: "e.g. @main, @v1.2.0"

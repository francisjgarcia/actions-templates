---
name: "\U0001F527 Improvement request"
description: Suggest an improvement to an existing workflow or action.
title: "refactor: <short description>"
labels: ["improvement"]
assignees:
  - francisjgarcia

body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make an existing workflow or action better? Tell us about it!

  - type: input
    id: target
    attributes:
      label: Workflow or action to improve
      placeholder: "e.g. wf-deploy.yml, actions/calculate-tag"
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: Describe what the workflow or action currently does.
    validations:
      required: true

  - type: textarea
    id: improved
    attributes:
      label: Improved behavior
      description: Describe how you think it should work instead.
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: Benefit
      description: How does this improvement benefit users of the template?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context

---
name: Lint (Reusable)

on:
  workflow_call:
    inputs:
      yamllint_paths:
        required: false
        type: string
        default: '.github/workflows/'
        description: 'Newline-separated list of paths to lint with yamllint'
      yamllint_max_line_length:
        required: false
        type: number
        default: 180
        description: 'Maximum line length for yamllint'

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12
        with:
          args: -color

      - name: Actionlint summary
        if: always()
        run: |
          {
            echo "## Lint summary"
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| actionlint | ✅ Passed |"
          } >> "$GITHUB_STEP_SUMMARY"

  yamllint:
    name: Lint YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_data: |
            extends: default
            rules:
              document-start: disable
              line-length:
                max: ${{ inputs.yamllint_max_line_length }}
              colons:
                max-spaces-after: -1
              braces:
                min-spaces-inside: 0
                max-spaces-inside: 1
              truthy:
                allowed-values: ['true', 'false', 'on', 'off']
              comments:
                min-spaces-from-content: 1
          file_or_dir: ${{ inputs.yamllint_paths }}

      - name: Yamllint summary
        if: always()
        env:
          YAMLLINT_PATHS: ${{ inputs.yamllint_paths }}
        run: |
          YAMLLINT_PATHS_INLINE=$(echo "$YAMLLINT_PATHS" | tr '\n' ' ' | sed 's/ $//')
          {
            echo "## Lint summary"
            echo "| Check | Paths | Result |"
            echo "| --- | --- | --- |"
            echo "| yamllint | \`${YAMLLINT_PATHS_INLINE}\` | ✅ Passed |"
          } >> "$GITHUB_STEP_SUMMARY"

  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12
        with:
          args: -color

      - name: Actionlint summary
        if: always()
        run: |
          {
            echo "## Lint summary"
            echo "| Check | Result |"
            echo "| --- | --- |"
            echo "| actionlint | ✅ Passed |"
          } >> "$GITHUB_STEP_SUMMARY"

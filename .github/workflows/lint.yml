name: Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint workflows and actions
    uses: ./.github/workflows/wf-lint.yml
    with:
      actionlint_paths: '.github/workflows/*.yml'
      yamllint_paths: |
        .github/workflows/
        actions/

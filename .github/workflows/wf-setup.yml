---
name: Setup (Reusable)

on:
  workflow_call:
    outputs:
      tag_version: {value: "${{ jobs.setup.outputs.tag_version }}"}
      bump_type: {value: "${{ jobs.setup.outputs.bump_type }}"}
      repo_name: {value: "${{ jobs.setup.outputs.repo_name }}"}
      repo_description: {value: "${{ jobs.setup.outputs.repo_description }}"}
      author_name: {value: "${{ jobs.setup.outputs.author_name }}"}
      author_email: {value: "${{ jobs.setup.outputs.author_email }}"}
      created_at: {value: "${{ jobs.setup.outputs.created_at }}"}
      changelog_entries: {value: "${{ jobs.setup.outputs.changelog_entries }}"}

jobs:
  setup:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      tag_version: ${{ steps.tag.outputs.tag_version }}
      bump_type: ${{ steps.tag.outputs.bump_type }}
      repo_name: ${{ steps.vars.outputs.repo_name }}
      repo_description: ${{ steps.vars.outputs.repo_description }}
      author_name: ${{ steps.vars.outputs.author_name }}
      author_email: ${{ steps.vars.outputs.author_email }}
      created_at: ${{ steps.vars.outputs.created_at }}
      changelog_entries: ${{ steps.tag.outputs.changelog_entries }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Calculate tag
        id: tag
        uses: francisjgarcia/actions-templates/actions/calculate-tag@main

      - name: Set variables
        id: vars
        run: |
          echo "repo_name=${GITHUB_REPOSITORY#*/}" >> $GITHUB_OUTPUT
          echo "repo_description=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${GITHUB_REPOSITORY} | jq -r '.description // ""')" >> $GITHUB_OUTPUT
          echo "author_name=$(git log -1 --pretty=format:'%an')" >> $GITHUB_OUTPUT
          echo "author_email=$(git log -1 --pretty=format:'%ae')" >> $GITHUB_OUTPUT
          echo "created_at=$(date --rfc-3339=seconds)" >> $GITHUB_OUTPUT

      - name: Setup summary
        run: |
          echo "## Setup summary" >> $GITHUB_STEP_SUMMARY
          echo "### Output variables" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: production" >> $GITHUB_STEP_SUMMARY
          if [[ -n "${{ steps.tag.outputs.tag_version }}" ]]; then
            TAG_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${{ steps.tag.outputs.tag_version }}"
            echo "- Tag version: [${{ steps.tag.outputs.tag_version }}](${TAG_URL})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Tag version: no release (\`${{ steps.tag.outputs.bump_type }}\` commit)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- Repository name: [${{ steps.vars.outputs.repo_name }}](https://github.com/${GITHUB_REPOSITORY})" >> $GITHUB_STEP_SUMMARY
          echo "- Repository description: ${{ steps.vars.outputs.repo_description }}" >> $GITHUB_STEP_SUMMARY
          echo "- Author name: ${{ steps.vars.outputs.author_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Author email: ${{ steps.vars.outputs.author_email }}" >> $GITHUB_STEP_SUMMARY
          echo "- Created at: ${{ steps.vars.outputs.created_at }}" >> $GITHUB_STEP_SUMMARY

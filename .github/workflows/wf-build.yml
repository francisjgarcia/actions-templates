name: Build (Reusable)

on:
  workflow_call:
    inputs:
      tag_version:
        required: true
        type: string
      github_repository:
        required: true
        type: string
      author_name:
        required: true
        type: string
      author_email:
        required: true
        type: string
      repo_description:
        required: false
        type: string
        default: ''
      created_at:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: docker/Dockerfile
      platform:
        required: false
        type: string
        default: 'linux/amd64'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    if: inputs.tag_version != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3.6.1

      - name: Build docker image
        uses: docker/build-push-action@v6.7.0
        with:
          load: true
          platforms: ${{ inputs.platform }}
          context: ${{ github.workspace }}
          file: ${{ github.workspace }}/${{ inputs.dockerfile }}
          tags: ghcr.io/${{ inputs.github_repository }}:${{ inputs.tag_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.authors=${{ inputs.author_name }} <${{ inputs.author_email }}>
            org.opencontainers.image.title=${{ inputs.github_repository }}
            org.opencontainers.image.description=${{ inputs.repo_description }}
            org.opencontainers.image.version=${{ inputs.tag_version }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ inputs.github_repository }}
            org.opencontainers.image.documentation=https://github.com/${{ inputs.github_repository }}/blob/${{ inputs.tag_version }}/README.md
            org.opencontainers.image.created=${{ inputs.created_at }}

      - name: Save docker image
        run: docker save ghcr.io/${{ inputs.github_repository }}:${{ inputs.tag_version }} -o docker-image.tar

      - name: Upload docker image as artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: docker-image.tar
          retention-days: 1

      - name: Build summary
        run: |
          echo "## Build summary" >> $GITHUB_STEP_SUMMARY
          echo "| Input | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/${{ inputs.github_repository }}:${{ inputs.tag_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfile | \`${{ inputs.dockerfile }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ inputs.platform }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Created at | \`${{ inputs.created_at }}\` |" >> $GITHUB_STEP_SUMMARY

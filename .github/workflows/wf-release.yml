name: Release (Reusable)

on:
  workflow_call:
    inputs:
      tag_version:
        required: true
        type: string
      bump_type:
        required: true
        type: string
      github_repository:
        required: true
        type: string
      changelog_entries:
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production
    if: inputs.tag_version != ''
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update CHANGELOG.md
        env:
          TAG_VERSION: ${{ inputs.tag_version }}
          GITHUB_REPOSITORY: ${{ inputs.github_repository }}
          CHANGELOG_ENTRIES: ${{ inputs.changelog_entries }}
        run: |
          # Write changelog entries to a temp file to preserve formatting
          TEMP_ENTRIES=$(mktemp)
          echo "$CHANGELOG_ENTRIES" > "$TEMP_ENTRIES"

          # Build new changelog header
          TEMP_CHANGELOG=$(mktemp)
          echo "# Changelog" > "$TEMP_CHANGELOG"
          echo "" >> "$TEMP_CHANGELOG"
          echo "## [$TAG_VERSION](https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG_VERSION) ($(date +'%Y-%m-%d'))" >> "$TEMP_CHANGELOG"
          echo "" >> "$TEMP_CHANGELOG"
          cat "$TEMP_ENTRIES" >> "$TEMP_CHANGELOG"
          echo "" >> "$TEMP_CHANGELOG"

          # Append previous changelog content preserving history
          if [ -f CHANGELOG.md ]; then
            sed '/^# Changelog$/d' CHANGELOG.md | sed '/^$/N;/^\n$/d' >> "$TEMP_CHANGELOG"
          fi

          mv "$TEMP_CHANGELOG" CHANGELOG.md
          rm -f "$TEMP_ENTRIES"

          echo "CHANGELOG.md updated:"
          cat CHANGELOG.md

      - name: Commit and push CHANGELOG.md
        uses: qoomon/actions--create-commit@v1.2.1
        with:
          message: "docs: update CHANGELOG.md for ${{ inputs.tag_version }}"
          skip-empty: true

      - name: Push
        run: git push

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.0.8
        with:
          tag_name: ${{ inputs.tag_version }}
          name: "Release ${{ inputs.tag_version }}"
          prerelease: false
          draft: false
          generate_release_notes: true
          body: |
            **Bump type:** `${{ inputs.bump_type }}`

            <details>
              <summary>Changelog</summary>

              ${{ inputs.changelog_entries }}
            </details>

      - name: Release summary
        env:
          TAG_VERSION: ${{ inputs.tag_version }}
          GITHUB_REPOSITORY: ${{ inputs.github_repository }}
          CHANGELOG_ENTRIES: ${{ inputs.changelog_entries }}
        run: |
          echo "## Release summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | [$TAG_VERSION](https://github.com/$GITHUB_REPOSITORY/releases/tag/$TAG_VERSION) |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump type | \`${{ inputs.bump_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changelog" >> $GITHUB_STEP_SUMMARY
          echo "$CHANGELOG_ENTRIES" >> $GITHUB_STEP_SUMMARY

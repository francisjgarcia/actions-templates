---
name: CodeQL

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.1

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.35.1

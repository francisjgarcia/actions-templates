---
name: Calculate next semver tag
description: Calculates the next semver tag using Conventional Commits and generates a grouped changelog

outputs:
  tag_version:
    description: Next tag (vX.Y.Z) or empty if no release needed
    value: ${{ steps.calc.outputs.tag_version }}
  bump_type:
    description: major | minor | patch | none
    value: ${{ steps.calc.outputs.bump_type }}
  changelog_entries:
    description: Grouped changelog entries in markdown format
    value: ${{ steps.calc.outputs.changelog_entries }}

runs:
  using: composite
  steps:
    - name: Calculate semver from conventional commits
      id: calc
      shell: bash
      run: |
        LAST_TAG=$(git tag -l 'v*' | sort -V | tail -n 1)
        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --pretty=format:"%s|||%h|||%an" HEAD)
          CURRENT="v0.0.0"
        else
          COMMITS=$(git log --pretty=format:"%s|||%h|||%an" ${LAST_TAG}..HEAD)
          CURRENT="$LAST_TAG"
        fi

        echo "Last tag: $CURRENT"

        BUMP="none"

        while IFS= read -r line; do
          [ -z "$line" ] && continue
          msg=$(echo "$line" | cut -d'|' -f1)

          if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE:'; then
            BUMP="major"
          elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
            [ "$BUMP" != "major" ] && BUMP="minor"
          elif echo "$msg" | grep -qE '^(fix|perf|refactor)(\(.+\))?:'; then
            [ "$BUMP" = "none" ] && BUMP="patch"
          fi
        done <<< "$COMMITS"

        echo "Bump type: $BUMP"

        if [ "$BUMP" = "none" ]; then
          echo "No release needed."
          echo "tag_version=" >> $GITHUB_OUTPUT
          echo "bump_type=none" >> $GITHUB_OUTPUT
          echo "changelog_entries=" >> $GITHUB_OUTPUT
          exit 0
        fi

        CLEAN=$(echo "$CURRENT" | sed 's/^v//')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"

        case "$BUMP" in
          major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
          minor) MINOR=$((MINOR+1)); PATCH=0 ;;
          patch) PATCH=$((PATCH+1)) ;;
        esac

        NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
        echo "Next tag: $NEXT_TAG"
        echo "tag_version=$NEXT_TAG" >> $GITHUB_OUTPUT
        echo "bump_type=$BUMP" >> $GITHUB_OUTPUT

        # Grouped changelog by commit type
        BREAKING=""
        FEATURES=""
        FIXES=""
        PERF=""
        REFACTORS=""
        OTHERS=""

        while IFS= read -r line; do
          [ -z "$line" ] && continue
          msg=$(echo "$line" | cut -d'|' -f1)
          hash=$(echo "$line" | cut -d'|' -f4)
          author=$(echo "$line" | cut -d'|' -f7)
          entry="* ${msg} ([${hash}](https://github.com/${GITHUB_REPOSITORY}/commit/${hash})) — ${author}"

          if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE:'; then
            BREAKING="${BREAKING}\n${entry}"
          elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
            FEATURES="${FEATURES}\n${entry}"
          elif echo "$msg" | grep -qE '^fix(\(.+\))?:'; then
            FIXES="${FIXES}\n${entry}"
          elif echo "$msg" | grep -qE '^perf(\(.+\))?:'; then
            PERF="${PERF}\n${entry}"
          elif echo "$msg" | grep -qE '^refactor(\(.+\))?:'; then
            REFACTORS="${REFACTORS}\n${entry}"
          else
            OTHERS="${OTHERS}\n${entry}"
          fi
        done <<< "$COMMITS"

        # Build grouped changelog
        CHANGELOG=""
        [ -n "$BREAKING" ]  && CHANGELOG="${CHANGELOG}\n### ⚠️ Breaking changes\n${BREAKING}\n"
        [ -n "$FEATURES" ]  && CHANGELOG="${CHANGELOG}\n### ✨ New features\n${FEATURES}\n"
        [ -n "$FIXES" ]     && CHANGELOG="${CHANGELOG}\n### 🐛 Bug fixes\n${FIXES}\n"
        [ -n "$PERF" ]      && CHANGELOG="${CHANGELOG}\n### ⚡ Performance improvements\n${PERF}\n"
        [ -n "$REFACTORS" ] && CHANGELOG="${CHANGELOG}\n### ♻️ Refactors\n${REFACTORS}\n"
        [ -n "$OTHERS" ]    && CHANGELOG="${CHANGELOG}\n### 🔧 Other changes\n${OTHERS}\n"

        echo "changelog_entries<<EOF" >> $GITHUB_OUTPUT
        echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

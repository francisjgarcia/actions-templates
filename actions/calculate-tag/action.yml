name: Calculate next semver tag
description: Calculate the next semver tag based on conventional commits since the last tag. Outputs the next tag version, the type of bump (major, minor, patch, none) and a list of commits for the changelog.

outputs:
  tag_version:
    description: Next tag (vX.Y.Z) or empty if no release is needed
    value: ${{ steps.calc.outputs.tag_version }}
  bump_type:
    description: major | minor | patch | none
    value: ${{ steps.calc.outputs.bump_type }}
  changelog_entries:
    description: List of commits for the changelog
    value: ${{ steps.calc.outputs.changelog_entries }}

runs:
  using: composite
  steps:
    - name: Calculate semver from conventional commits
      id: calc
      shell: bash
      run: |
        # Get commits since the last tag (or all if none)
        LAST_TAG=$(git tag -l 'v*' | sort -V | tail -n 1)
        if [ -z "$LAST_TAG" ]; then
          COMMITS=$(git log --pretty=format:"%s" HEAD)
          CURRENT="v0.0.0"
        else
          COMMITS=$(git log --pretty=format:"%s" ${LAST_TAG}..HEAD)
          CURRENT="$LAST_TAG"
        fi

        echo "Last tag: $CURRENT"
        echo "Commits to analyze:"
        echo "$COMMITS"

        # Classify each commit and keep the highest bump
        BUMP="none"

        while IFS= read -r msg; do
          [ -z "$msg" ] && continue

          # BREAKING CHANGE = major (! in type or footer BREAKING CHANGE:)
          if echo "$msg" | grep -qE '^[a-z]+(\(.+\))?!:' || echo "$msg" | grep -q 'BREAKING CHANGE:'; then
            BUMP="major"

          # feat = minor (only if we haven't reached major)
          elif echo "$msg" | grep -qE '^feat(\(.+\))?:'; then
            [ "$BUMP" != "major" ] && BUMP="minor"

          # fix, perf, refactor = patch (only if we haven't reached minor or major)
          elif echo "$msg" | grep -qE '^(fix|perf|refactor)(\(.+\))?:'; then
            [ "$BUMP" = "none" ] && BUMP="patch"
          fi
          # chore, docs, ci, test, style, build → BUMP remains the same (none)
        done <<< "$COMMITS"

        echo "Bump type: $BUMP"

        # Calculate new tag
        if [ "$BUMP" = "none" ]; then
          echo "No release needed."
          echo "tag_version=" >> $GITHUB_OUTPUT
          echo "bump_type=none" >> $GITHUB_OUTPUT
          echo "changelog_entries=" >> $GITHUB_OUTPUT
          exit 0
        fi

        CLEAN=$(echo "$CURRENT" | sed 's/^v//')
        IFS='.' read -r MAJOR MINOR PATCH <<< "$CLEAN"

        case "$BUMP" in
          major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
          minor) MINOR=$((MINOR+1)); PATCH=0 ;;
          patch) PATCH=$((PATCH+1)) ;;
        esac

        NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
        echo "Next tag: $NEXT_TAG"
        echo "tag_version=$NEXT_TAG" >> $GITHUB_OUTPUT
        echo "bump_type=$BUMP" >> $GITHUB_OUTPUT

        # Generate changelog entries
        if [ -z "$LAST_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:"* %s (%h)" HEAD)
        else
          CHANGELOG=$(git log --pretty=format:"* %s (%h)" ${LAST_TAG}..HEAD)
        fi
        # Multiline output for GITHUB_OUTPUT
        echo "changelog_entries<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
